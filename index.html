<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12242E">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GlucoLog: jurnal de diabet</title>
<style>
html[data-theme="dark"]{
  --ink:#E8EEF1; --ink-soft:#9CB0BA; --paper:#0F1B22; --card:#17262F;
  --line:#2A3B45; --petrol:#33ADA9; --petrol-soft:#123A3A;
  --low:#F06A6A; --ok:#3FBF85; --high:#E8AC3F; --vhigh:#E06A48;
  --shadow:0 1px 3px rgba(0,0,0,.35), 0 4px 14px rgba(0,0,0,.28);
}
html[data-theme="dark"] .chip{background:var(--card)}
html[data-theme="dark"] .inp{background:var(--card)}
html[data-theme="dark"] #banner{background:#3A3216; border-color:#6B5A1E; color:#EAD79A}
html[data-theme="dark"] #topbar{background:#0A141A; border-bottom:1px solid var(--line)}
:root{
  --ink:#12242E;          /* albastru-cerneală profund */
  --ink-soft:#3C5260;
  --paper:#F2F6F7;        /* porțelan rece */
  --card:#FFFFFF;
  --line:#DDE6E9;
  --petrol:#0E7C7B;       /* accent principal */
  --petrol-soft:#E0F0EF;
  --low:#D64545;          /* hipo */
  --ok:#2E9E6B;           /* în țintă */
  --high:#DF9A22;         /* peste țintă */
  --vhigh:#C94F30;        /* mult peste */
  --r:16px;
  --shadow:0 1px 3px rgba(18,36,46,.08), 0 4px 14px rgba(18,36,46,.06);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--paper); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; font-size:16px; line-height:1.45}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer}
input,select,textarea{font:inherit; color:var(--ink)}
h1,h2,h3{margin:0; line-height:1.2}
.num{font-variant-numeric:tabular-nums}

/* ---------- cadru ---------- */
#topbar{position:sticky; top:0; z-index:30; background:var(--ink); color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 18px 10px; display:flex; align-items:baseline; justify-content:space-between}
#topbar .brand{font-weight:800; letter-spacing:.3px; font-size:17px}
#topbar .brand span{color:#7FD1C8}
#topbar .who{font-size:13px; opacity:.85}
main{max-width:560px; margin:0 auto; padding:14px 14px calc(96px + env(safe-area-inset-bottom))}
.view{display:none}
.view.on{display:block}

#tabs{position:fixed; bottom:0; left:0; right:0; z-index:30; background:var(--card);
  border-top:1px solid var(--line); display:flex; padding-bottom:env(safe-area-inset-bottom)}
#tabs button{flex:1; padding:9px 2px 8px; font-size:11.5px; color:var(--ink-soft); display:flex; flex-direction:column; align-items:center; gap:3px}
#tabs button .ico{font-size:20px; line-height:1}
#tabs button.on{color:var(--petrol); font-weight:700}

/* ---------- carduri ---------- */
.card{background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:16px; margin-bottom:12px}
.card h2{font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-soft); margin-bottom:10px; font-weight:700}
.muted{color:var(--ink-soft); font-size:13px}
.card p.muted{text-align:left; line-height:1.55; font-size:12.5px; letter-spacing:.1px}
.stat span{line-height:1.3}
.spread{display:flex; justify-content:space-between; align-items:center; gap:10px}

/* ---------- eroul „Acum" ---------- */
#hero{display:flex; gap:16px; align-items:center}
#dial{position:relative; width:118px; height:118px; flex:none}
#dial svg{transform:rotate(-90deg)}
#dial .v{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
#dial .v b{font-size:34px; font-weight:800; letter-spacing:-1px}
#dial .v small{font-size:10.5px; color:var(--ink-soft); margin-top:-2px}
#hero .side{flex:1}
#hero .delta{font-size:14px; font-weight:700; margin-bottom:2px}
#hero .ago{font-size:13px; color:var(--ink-soft)}
.mini3{display:flex; gap:8px; margin-top:12px}
.mini3 div{flex:1; background:var(--paper); border-radius:12px; padding:8px 6px; text-align:center}
.mini3 b{display:block; font-size:16px; font-weight:800}
.mini3 span{font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.4px}
#spark{margin-top:12px}
#spark svg{width:100%; height:76px; display:block}

/* ---------- butoane adăugare ---------- */
#quick{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:2px 0 14px}
#quick button{background:var(--card); border-radius:14px; box-shadow:var(--shadow);
  padding:12px 4px; display:flex; flex-direction:column; align-items:center; gap:5px; font-size:12px; font-weight:600; min-height:66px}
#quick button .ico{width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; color:#fff}
.i-gluc{background:var(--petrol)} .i-meal{background:#B0672E} .i-ins{background:#3F5E8C} .i-note{background:#6B7A85}

/* ---------- cronologie ---------- */
.daypart{margin:16px 4px 8px; font-size:12px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft);
  display:flex; align-items:center; gap:10px}
.daypart::after{content:""; flex:1; height:1px; background:var(--line)}
.ev{background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:11px 13px; margin-bottom:8px;
  display:flex; gap:11px; align-items:flex-start; width:100%; text-align:left}
.ev .t{font-size:12.5px; color:var(--ink-soft); flex:none; width:44px; padding-top:2px; font-weight:600}
.ev .body{flex:1; min-width:0}
.ev .hl{font-weight:700; font-size:15px}
.ev .sub{font-size:13px; color:var(--ink-soft); margin-top:1px; overflow-wrap:anywhere}
.pill{display:inline-block; padding:1px 9px; border-radius:99px; font-size:12.5px; font-weight:800; color:#fff}
.p-low{background:var(--low)} .p-ok{background:var(--ok)} .p-high{background:var(--high)} .p-vhigh{background:var(--vhigh)}
.empty{padding:26px 14px; text-align:center; color:var(--ink-soft); font-size:14px}
.empty .ei{display:block; font-size:36px; line-height:1; margin-bottom:10px; opacity:.9}
.empty b{display:block; font-size:15.5px; color:var(--ink); margin-bottom:5px}
.empty .hint{display:block; font-size:13px; line-height:1.5; max-width:300px; margin:0 auto}
.empty .act{display:inline-block; margin-top:14px; background:var(--petrol); color:#fff;
  padding:9px 18px; border-radius:99px; font-size:14px; font-weight:700}
.bkline{display:flex; align-items:center; justify-content:center; gap:7px; margin:18px 4px 2px;
  font-size:12.5px; color:var(--ink-soft)}
.bkline i{width:7px; height:7px; border-radius:9px; background:var(--ok); flex:none; font-style:normal}
.bkline.warn i{background:var(--high)} .bkline.bad i{background:var(--low)}
.bkline b{font-weight:700; color:var(--ink-soft)}
.bkline button{color:var(--petrol); font-weight:700; font-size:12.5px; text-decoration:underline}
.mealsum{display:flex; align-items:center; gap:8px; margin:-2px 0 8px 55px; padding:7px 13px;
  background:var(--petrol-soft); border-radius:11px; font-size:13.5px; color:#0B5C5B; font-weight:700}
.mealsum .lbl{font-weight:600; color:#3C6B6A}
.mealsum b{font-size:15px}

/* ---------- formulare / foi ---------- */
#veil{position:fixed; inset:0; background:rgba(18,36,46,.45); z-index:40; display:none}
#veil.on{display:block}
#sheet{position:fixed; left:0; right:0; bottom:0; z-index:41; background:var(--card);
  border-radius:22px 22px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom));
  max-height:88vh; overflow-y:auto; transform:translateY(105%); transition:transform .22s ease}
#sheet.on{transform:none}
#sheet h3{font-size:18px; font-weight:800; margin-bottom:14px}
.frow{margin-bottom:13px}
.frow label{display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px}
.inp{width:100%; border:1.5px solid var(--line); border-radius:12px; padding:11px 12px; font-size:16px; background:#fff}
.inp:focus{outline:none; border-color:var(--petrol)}
.bignum{font-size:30px; font-weight:800; text-align:center; letter-spacing:-.5px}
.rowflex{display:flex; gap:8px}
.rowflex>*{flex:1}
.chips{display:flex; gap:7px; flex-wrap:wrap}
.chip{border:1.5px solid var(--line); border-radius:99px; padding:7px 14px; font-size:14px; font-weight:600; background:#fff}
.chip.on{background:var(--petrol); border-color:var(--petrol); color:#fff}
.btn{display:block; width:100%; padding:14px; border-radius:14px; font-size:16px; font-weight:800; text-align:center}
.btn-p{background:var(--petrol); color:#fff}
.btn-g{background:var(--paper); color:var(--ink); margin-top:8px}
.btn-d{background:none; color:var(--low); margin-top:6px; font-weight:700; font-size:14px}
.btn-danger{background:var(--low); color:#fff}
.btn[disabled]{opacity:.45}

/* compunere masă */
#mitems .mi{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px dashed var(--line)}
#mitems .mi b{flex:1; font-size:14.5px; font-weight:600}
#mitems .mi .hc{font-weight:800; color:#B0672E}
#mitems .mi button{color:var(--low); font-size:17px; padding:2px 6px}
#mtotal{text-align:right; font-size:17px; font-weight:800; margin:8px 0 4px; color:#B0672E}
.foodhit{display:flex; justify-content:space-between; width:100%; padding:11px 4px; border-bottom:1px solid var(--line); text-align:left; font-size:15px}
.foodhit small{color:var(--ink-soft)}
#gramveil{position:fixed; inset:0; background:rgba(18,36,46,.55); z-index:50; display:none; align-items:center; justify-content:center; padding:24px}
#gramveil.on{display:flex}
#grambox{background:var(--card); border-radius:20px; padding:20px 20px 18px; width:100%; max-width:340px; box-shadow:0 8px 40px rgba(0,0,0,.3)}
#grambox h3{font-size:17px; font-weight:800; margin-bottom:4px}
#grambox .sub{font-size:13px; color:var(--ink-soft); margin-bottom:14px}
#grambox .hcprev{text-align:center; font-size:13px; color:#B0672E; font-weight:700; min-height:18px; margin-top:8px}
#grambox .acts{display:flex; gap:8px; margin-top:16px}
#grambox .acts button{flex:1; padding:13px; border-radius:13px; font-size:15px; font-weight:800}
#grambox .cancel{background:var(--paper); color:var(--ink)}
#grambox .ok{background:var(--petrol); color:#fff}

/* alimente */
.fooditem{display:flex; align-items:center; gap:10px; padding:12px 2px; border-bottom:1px solid var(--line); width:100%; text-align:left}
.fooditem .star{font-size:19px; color:#D9A400; flex:none}
.fooditem .txt{flex:1; min-width:0}
.fooditem .n{display:block; font-weight:600; font-size:15px}
.fooditem .d{display:block; font-size:12.5px; color:var(--ink-soft); margin-top:2px}

/* istoric */
#hsearch{position:sticky; top:calc(46px + env(safe-area-inset-top)); z-index:20; background:var(--paper); padding:6px 0 10px}
.dayhead{margin:14px 4px 6px; font-weight:800; font-size:14px; display:flex; justify-content:space-between; align-items:baseline}
.dayhead .muted{font-weight:600}

/* statistici */
.statgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.stat{background:var(--paper); border-radius:12px; padding:11px; text-align:center}
.stat{min-width:0; overflow:hidden}
.stat b{display:block; font-size:22px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.3px}
.stat b .u{font-size:11.5px; font-weight:700; color:var(--ink-soft); letter-spacing:0; margin-left:3px}
.stat span{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.4px; display:block; overflow-wrap:anywhere}
.tirbar{display:flex; height:26px; border-radius:8px; overflow:hidden; margin:10px 0 4px}
.tirbar div{display:flex; align-items:center; justify-content:center; color:#fff; font-size:11.5px; font-weight:800; min-width:3px; overflow:hidden}
.tirbar div span{white-space:nowrap; padding:0 2px}
.tirlegend{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap}
.tirlegend div{display:flex; align-items:center; gap:5px; font-size:12px; color:var(--ink-soft)}
.tirlegend i{width:11px; height:11px; border-radius:3px; flex:none}
.tirlegend b{color:var(--ink); font-weight:800}
.bars{display:flex; gap:14px; align-items:flex-end; height:92px; margin-top:10px; padding:0 4px}
.bars .b{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px}
.bars .b i{width:100%; max-width:46px; border-radius:7px 7px 0 0; background:var(--petrol); font-style:normal; display:flex; align-items:flex-start; justify-content:center; color:#fff; font-size:11px; font-weight:800; padding-top:3px}
.bars .b span{font-size:10.5px; color:var(--ink-soft); text-transform:uppercase}

/* meniu */
.mrow{display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:14px 4px; border-bottom:1px solid var(--line); font-size:15px; font-weight:600}
.mrow .ico{font-size:19px; width:28px; text-align:center}
.mrow small{display:block; font-weight:400; color:var(--ink-soft); font-size:12.5px}

#banner{background:#FFF4DE; border:1px solid #EAD199; color:#7A5B12; border-radius:14px; padding:12px 14px; font-size:13.5px; margin-bottom:12px; display:none}
#banner.urgent{background:#FBE4DC; border-color:#E0A491; color:#8A3418}
html[data-theme="dark"] #banner.urgent{background:#3E2018; border-color:#7A3A28; color:#F0B9A8}
#banner b{display:block; margin-bottom:2px}
#banner button{color:var(--petrol); font-weight:800; padding:6px 0 0}

#toast{position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(20px);
  background:#12242E; color:#fff; padding:10px 18px; border-radius:99px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; white-space:nowrap}
#toast.on{opacity:1; transform:translateX(-50%)}

/* raport medic: doar la tipărire */
#report{display:none}
@media print{
  body>*{display:none !important}
  body{background:#fff}
  #report{display:block !important; font-size:12px; color:#000; padding:6mm}
  #report h1{font-size:20px; margin-bottom:2px}
  #report h2{font-size:14px; margin:14px 0 6px; border-bottom:2px solid #000; padding-bottom:3px}
  #report table{width:100%; border-collapse:collapse; margin-top:4px}
  #report th,#report td{border:1px solid #999; padding:3px 6px; text-align:left; vertical-align:top}
  #report th{background:#eee}
  #report .rmeta{color:#444; margin-bottom:8px}
}
@media (prefers-reduced-motion:reduce){ #sheet{transition:none} #toast{transition:opacity .1s} }
/* ---------- ecran culcat (landscape) ---------- */
@media (orientation:landscape) and (max-height:540px){
  #topbar{padding:calc(5px + env(safe-area-inset-top)) 18px 5px}
  #topbar .brand{font-size:15px}
  main{padding:10px 14px calc(74px + env(safe-area-inset-bottom))}
  #tabs button{padding:5px 2px 4px; font-size:10.5px; gap:1px}
  #tabs button .ico{font-size:17px}
  #dial{width:94px; height:94px}
  #dial .v b{font-size:27px}
  #spark svg{height:58px}
  #quick button{min-height:56px; padding:9px 4px}
  .statgrid{grid-template-columns:repeat(3,1fr)}
  .bars{height:76px}
  #sheet{max-height:94vh; border-radius:16px 16px 0 0}
}
</style>
</head>
<body>

<header id="topbar">
  <div class="brand">Gluco<span>Log</span></div>
  <div class="who" id="whoami"></div>
</header>

<main>
  <div id="banner"></div>

  <!-- AZI -->
  <section class="view on" id="v-today">
    <div class="card" id="heroCard">
      <div id="hero"></div>
      <div class="mini3" id="mini3"></div>
      <div id="spark"></div>
    </div>
    <div id="quick">
      <button onclick="shGluc()"><span class="ico i-gluc">◉</span>Glicemie</button>
      <button onclick="shMeal()"><span class="ico i-meal">🍽</span>Masă</button>
      <button onclick="shIns()"><span class="ico i-ins">💉</span>Insulină</button>
      <button onclick="shNote()"><span class="ico i-note">✎</span>Altele</button>
    </div>
    <div id="timeline"></div>
    <div id="bkline"></div>
  </section>

  <!-- ISTORIC -->
  <section class="view" id="v-hist">
    <div id="hsearch">
      <input class="inp" id="q" placeholder="Caută: aliment, notă, insulină…" oninput="renderHist()">
    </div>
    <div id="histbody"></div>
  </section>

  <!-- ALIMENTE -->
  <section class="view" id="v-foods">
    <button class="btn btn-p" onclick="shFood()">+ Aliment nou</button>
    <div class="card" style="margin-top:12px">
      <input class="inp" id="fq" placeholder="Caută în biblioteca ta…" oninput="renderFoods()">
      <div id="foodlist"></div>
    </div>
  </section>

  <!-- STATISTICI -->
  <section class="view" id="v-stats">
    <div class="chips" id="periodChips" style="margin-bottom:12px"></div>
    <div id="statsbody"></div>
  </section>

  <!-- MAI MULT -->
  <section class="view" id="v-more">
    <div class="card">
      <h2>Date & siguranță</h2>
      <button class="mrow" onclick="backupNow()"><span class="ico">🛟</span><span>Backup acum<small id="bkinfo">Salvează tot jurnalul într-un fișier</small></span></button>
      <button class="mrow" onclick="exportXLSX()"><span class="ico">📗</span><span>Export Excel (.xlsx)<small>Fișier Excel cu două foi: jurnalul și biblioteca de alimente</small></span></button>
      <button class="mrow" onclick="exportCSV()"><span class="ico">📊</span><span>Export CSV<small>Tabel simplu, bun pentru reimport în GlucoLog</small></span></button>
      <button class="mrow" onclick="document.getElementById('impfile').click()"><span class="ico">📥</span><span>Import<small>Backup GlucoLog (.json) sau tabel CSV</small></span></button>
      <input type="file" id="impfile" accept=".json,.csv" style="display:none" onchange="importFile(this)">
      <button class="mrow" onclick="shDelDay()"><span class="ico">🧹</span><span>Șterge o zi din jurnal<small>Util dacă o zi a ajuns dublată (Excel + aplicație)</small></span></button>
    </div>
    <div class="card">
      <h2>Pentru medic</h2>
      <button class="mrow" onclick="shReport()"><span class="ico">🩺</span><span>Raport pentru doctor<small>Imagine macro pe perioade, opțional cu jurnal detaliat · PDF din tipărire</small></span></button>
    </div>
    <div class="card">
      <h2>Setări</h2>
      <button class="mrow" onclick="shSettings()"><span class="ico">⚙️</span><span>Profil & ținte<small id="setSummary"></small></span></button>
    </div>
    <div class="card">
      <h2>Despre & informații legale</h2>
      <button class="mrow" onclick="shAbout()"><span class="ico">ℹ️</span><span>Ce este (și ce nu este) GlucoLog<small>Citește înainte de utilizare</small></span></button>
      <button class="mrow" onclick="shPrivacy()"><span class="ico">🔒</span><span>Confidențialitate<small>Unde îți sunt datele</small></span></button>
    </div>
    <p class="muted" style="padding:0 6px">GlucoLog v1.15.1 · Jurnal personal. Nu este un dispozitiv medical și nu oferă sfaturi medicale.<br>
      <span style="font-size:12px">© 2026 Constantin Enache <span style="white-space:nowrap">· <a href="mailto:hello.glucolog@gmail.com?subject=GlucoLog%20v1.15.1%20%E2%80%94%20" style="color:var(--petrol)">hello.glucolog@gmail.com</a></span></span></p>
  </section>
</main>

<nav id="tabs">
  <button class="on" data-v="today" onclick="go('today')"><span class="ico">☀️</span>Azi</button>
  <button data-v="hist" onclick="go('hist')"><span class="ico">🔍</span>Istoric</button>
  <button data-v="foods" onclick="go('foods')"><span class="ico">🥖</span>Alimente</button>
  <button data-v="stats" onclick="go('stats')"><span class="ico">📈</span>Statistici</button>
  <button data-v="more" onclick="go('more')"><span class="ico">☰</span>Mai mult</button>
</nav>

<div id="veil" onclick="closeSheet()"></div>
<div id="sheet"></div>
<div id="gramveil"><div id="grambox"></div></div>
<div id="toast"></div>
<div id="report"></div>


<script>
/* ================= STOCARE ================= */
const KEY='glucolog_v1';
let S = load();
function load(){
  try{ const d=JSON.parse(localStorage.getItem(KEY)); if(d && d.events) return d; }catch(e){}
  return { settings:{name:'', low:70, high:180, insulins:['Fiasp','Tresiba'], basal:'Tresiba', lastBackup:0},

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const two=n=>String(n).padStart(2,'0');
const MS_D=86400000;
function dKey(ts){ const d=new Date(ts); return d.getFullYear()+'-'+two(d.getMonth()+1)+'-'+two(d.getDate()); }
function tHM(ts){ const d=new Date(ts); return two(d.getHours())+':'+two(d.getMinutes()); }
const LUNI=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
const ZILE=['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
function dNice(ts){ const d=new Date(ts); return ZILE[d.getDay()]+', '+d.getDate()+' '+LUNI[d.getMonth()]+' '+d.getFullYear(); }
function daypart(ts){ const h=new Date(ts).getHours();
  if(h<11) return 'Dimineața'; if(h<17) return 'Prânz'; if(h<21) return 'Cină'; return 'Seara / noaptea'; }
function rangeClass(v){ const s=S.settings;
  if(v<s.low) return 'p-low'; if(v<=s.high) return 'p-ok'; if(v<=250) return 'p-high'; return 'p-vhigh'; }
function rangeColor(v){ const s=S.settings;
  if(v<s.low) return 'var(--low)'; if(v<=s.high) return 'var(--ok)'; if(v<=250) return 'var(--high)'; return 'var(--vhigh)'; }
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove('on'),1900); }
function sortEv(){ S.events.sort((a,b)=>a.ts-b.ts); }
function evOfDay(key){ return S.events.filter(e=>dKey(e.ts)===key); }
function fmtHC(x){ return (Math.round(x*10)/10).toString().replace('.',','); }
function median(a){ if(!a.length) return 0; const b=[...a].sort((x,y)=>x-y); const m=Math.floor(b.length/2);
  return b.length%2 ? b[m] : (b[m-1]+b[m])/2; }
function med(vals){ const v=vals.filter(x=>x>0); return v.length? Math.round(median(v)) : '—'; }
function computeICR(evs){
  // perechem fiecare masă (HC>0) cu bolusul cel mai apropiat de tip 'bolus' (±25 min)
  const meals=evs.filter(e=>e.type==='meal'&&(e.meal.hc||0)>0);
  const bol=evs.filter(e=>e.type==='ins'&&e.ins.kind==='bolus');
  const used=new Set(), byPart={};
  meals.forEach(m=>{
    let best=-1, bd=26*60000;
    bol.forEach((b,i)=>{ if(used.has(i))return; const d=Math.abs(b.ts-m.ts); if(d<bd){bd=d;best=i;} });
    if(best>=0 && bd<=25*60000){ const u=bol[best].ins.u; used.add(best);
      if(u>0 && m.meal.hc>=5 && m.meal.hc<=200){ const p=daypart(m.ts).replace(' / noaptea','');
        (byPart[p]=byPart[p]||[]).push(m.meal.hc/u); } }
  });
  return byPart;
}
function computeISF(evs){
  const gl=evs.filter(e=>e.type==='gluc');
  const corr=evs.filter(e=>e.type==='ins'&&e.ins.kind==='corectie');
  const vals=[]; let clean=0, dirty=0;
  corr.forEach(c=>{
    const before=gl.filter(g=>c.ts-g.ts>=0 && c.ts-g.ts<=30*60000);
    const after=gl.filter(g=>g.ts-c.ts>=2*3600000 && g.ts-c.ts<=4*3600000);
    if(!before.length||!after.length) return;
    const gb=before.reduce((a,b)=>c.ts-a.ts<c.ts-b.ts?a:b).gluc.v;
    const aft=after.reduce((a,b)=>a.ts<b.ts?a:b);
    const ga=aft.gluc.v;
    const food=evs.some(e=>e.ts>c.ts&&e.ts<aft.ts&&e.type==='meal');
    const ins=evs.some(e=>e.ts>c.ts&&e.ts<=aft.ts&&e.type==='ins');
    if(food||ins){ dirty++; return; }
    const drop=gb-ga;
    if(c.ins.u>0 && drop>0){ vals.push(drop/c.ins.u); clean++; }
  });
  return {vals, clean, dirty, total:corr.length};
}
function rangeLabel(dailyVals, unit){
  const v=dailyVals.filter(x=>x>0);
  if(!v.length) return '—';
  const mn=Math.min(...v), mx=Math.max(...v), md=Math.round(median(v));
  if(mn===mx) return mn+(unit||'');
  return mn+'–'+mx+(unit||'')+' · tipic '+md;
}
function histLastDose(name){
  for(let i=S.events.length-1;i>=0;i--){ const e=S.events[i];
    if(e.type==='ins'&&e.ins.name===name) return e.ins.u; }
  return ''; }

          <div class="sub">${items}${e.meal.note?(items?' · ':'')+esc(e.meal.note):''}</div>`;
  }else if(e.type==='kg'){
    body=`<div class="hl num">⚖️ ${e.kg.v} kg</div>`;
  }else{
    body=`<div class="hl">${e.type==='act'?'🏃 Activitate':'📝 Notă'}</div><div class="sub">${esc(e.note.text)}</div>`;
  }
  return `<button class="ev" onclick="editEv('${e.id}')">${t}<span class="body">${body}</span></button>`;
}
function emptyState(o){
  return `<div class="card empty"><span class="ei">${o.ic}</span><b>${o.t}</b>
    <span class="hint">${o.d}</span>
    ${o.btn?`<button class="act" onclick="${o.btn.go}">${o.btn.t}</button>`:''}</div>`;
}
function renderTimeline(el, evs){
  if(!evs.length){
    const lastAll=S.events[S.events.length-1];
    el.innerHTML = lastAll
      ? emptyState({ic:'☀️', t:'Zi nouă, jurnal gol',
          d:'Ultima intrare a fost '+dNice(lastAll.ts)+', la '+tHM(lastAll.ts)+'. Folosește butoanele de mai sus ca să notezi ceva; jurnalul complet e la Istoric.'})
      : emptyState({ic:'👋', t:'Aici va apărea ziua ta',
          d:'Tot ce notezi se așază aici, în ordinea orelor, grupat pe momentele zilei. Începe cu o glicemie: durează cinci secunde.',
          btn:{t:'Adaugă prima glicemie', go:'shGluc()'}});
    return; }
  let html='', lastPart='';
  let mealRun=[];  // grup de mese consecutive (≤45 min între ele)
  const flushMeals=()=>{
    if(mealRun.length){
      const tot=mealRun.reduce((a,m)=>a+(m.meal.hc||0),0);
      if(tot>0 && mealRun.length>1){
        html+=`<div class="mealsum"><span class="lbl">Total masă:</span> <b>${fmtHC(tot)} HC</b> <span class="lbl">· ${mealRun.length} alimente</span></div>`;
      }
      mealRun=[];
    }
  };
  evs.forEach(e=>{ const p=daypart(e.ts);
    if(p!==lastPart){ flushMeals(); html+=`<div class="daypart">${p}</div>`; lastPart=p; }
    if(e.type==='meal'){
      if(mealRun.length && (e.ts - mealRun[mealRun.length-1].ts) > 45*60000) flushMeals();
      html+=eventCard(e);
      mealRun.push(e);
    } else {
      flushMeals();
      html+=eventCard(e);
    }
  });
  flushMeals();
  el.innerHTML=html;
}
function renderToday(){

      delta=`<div class="delta" style="color:${col}">${d>5?'↗':(d<-5?'↘':'→')} ${d>0?'+':''}${d} față de ${tHM(prev.ts)}</div>`; }
    const pct=Math.max(.06, Math.min(1, last.gluc.v/300));
    const C=2*Math.PI*52;
    hero=`<div id="dial">
        <svg width="118" height="118" viewBox="0 0 118 118">
          <circle cx="59" cy="59" r="52" fill="none" stroke="var(--line)" stroke-width="10"/>
          <circle cx="59" cy="59" r="52" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${(C*pct).toFixed(1)} ${C.toFixed(1)}"/>
        </svg>
        <div class="v"><b class="num" style="color:${col}">${last.gluc.v}</b><small>mg/dl</small></div>
      </div>
      <div class="side">${delta}<div class="ago">${ago} · ${last.gluc.src==='senzor'?'senzor':'din deget'}</div></div>`;
  }
  $('hero').innerHTML=hero;
  // mini-statistici azi
  const g=evs.filter(e=>e.type==='gluc').map(e=>e.gluc.v);
  const hc=evs.filter(e=>e.type==='meal').reduce((a,e)=>a+(e.meal.hc||0),0);
  const bol=evs.filter(e=>e.type==='ins'&&e.ins.kind!=='bazala').reduce((a,e)=>a+e.ins.u,0);
  const baz=evs.filter(e=>e.type==='ins'&&e.ins.kind==='bazala').reduce((a,e)=>a+e.ins.u,0);
  $('mini3').innerHTML=`
    <div><b class="num">${g.length?Math.round(g.reduce((a,b)=>a+b,0)/g.length):'—'}</b><span>medie azi</span></div>
    <div><b class="num">${fmtHC(hc)}</b><span>HC azi</span></div>
    <div><b class="num">${bol||'—'}</b><span>rapidă U</span></div>
    <div><b class="num">${baz||'—'}</b><span>bazală U</span></div>`;
  renderSpark(evs);
  renderTimeline($('timeline'), evs);
  renderBkLine();
  $('whoami').textContent=S.settings.name?S.settings.name+' · '+dNice(Date.now()):dNice(Date.now());
}
function renderSpark(evs){
  const pts=evs.filter(e=>e.type==='gluc').map(e=>({x:new Date(e.ts).getHours()*60+new Date(e.ts).getMinutes(), v:e.gluc.v}));
  if(pts.length<2){ $('spark').innerHTML=''; return; }
  const s=S.settings, W=340, H=76, P=6;
  const ymax=Math.max(260, ...pts.map(p=>p.v))+20, ymin=40;
  const X=m=>P+(m/1439)*(W-2*P);
  const Y=v=>H-P-((Math.min(v,ymax)-ymin)/(ymax-ymin))*(H-2*P-10);
  const band=`<rect x="${P}" y="${Y(s.high)}" width="${W-2*P}" height="${Math.max(2,Y(s.low)-Y(s.high))}" fill="var(--petrol)" opacity="0.13" rx="3"/>`;
  const line=pts.map((p,i)=>(i?'L':'M')+X(p.x).toFixed(1)+' '+Y(p.v).toFixed(1)).join(' ');
  const dots=pts.map(p=>`<circle cx="${X(p.x).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.4" fill="${rangeColor(p.v)}"/>`).join('');
  const ticks=[0,6,12,18,24].map(h=>`<text x="${X(Math.min(h*60,1439)).toFixed(1)}" y="${H-1}" font-size="8.5" fill="var(--ink-soft)" text-anchor="middle">${two(h%24)}</text>`).join('');
  $('spark').innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    ${band}<path d="${line}" fill="none" stroke="var(--ink-soft)" stroke-width="1.6" opacity=".55"/>${dots}${ticks}</svg>`;
}

/* ================= ISTORIC + CĂUTARE ================= */
function evText(e){
  if(e.type==='gluc') return e.gluc.v+' '+e.gluc.src;
  if(e.type==='ins') return e.ins.u+'U '+e.ins.name+' '+e.ins.kind;
  if(e.type==='meal') return e.meal.items.map(i=>i.name).join(' ')+' '+(e.meal.note||'');
  if(e.type==='kg') return e.kg.v+' kg greutate';
  return e.note.text;
}
function mealTotalHtml(mealRun){
  if(mealRun.length<2) return '';
  const tot=mealRun.reduce((a,m)=>a+(m.meal.hc||0),0);
  if(tot<=0) return '';
  return `<div class="mealsum"><span class="lbl">Total masă:</span> <b>${fmtHC(tot)} HC</b> <span class="lbl">· ${mealRun.length} alimente</span></div>`;
}
function dayGroupedHtml(dayEvs){
  // dayEvs: cronologic crescător; grupăm pe momente + subtotal HC pe rulaje de mese (≤45 min)
  let html='', lastPart='', mealRun=[];
  const flush=()=>{ if(mealRun.length){ html+=mealTotalHtml(mealRun); mealRun=[]; } };
  dayEvs.forEach(e=>{ const p=daypart(e.ts);
    if(p!==lastPart){ flush(); html+=`<div class="daypart">${p}</div>`; lastPart=p; }
    if(e.type==='meal'){
      if(mealRun.length && (e.ts-mealRun[mealRun.length-1].ts)>45*60000) flush();
      html+=eventCard(e); mealRun.push(e);
    } else { flush(); html+=eventCard(e); }
  });
  flush();
  return html;
}
function renderHist(){
  const q=$('q').value.trim().toLowerCase();
  if(q){
    // în căutare rămânem la lista plată filtrată (potriviri răzlețe), cu context la mese
    let evs=[...S.events].reverse().filter(e=>evText(e).toLowerCase().includes(q)).slice(0,300);
    if(!evs.length){ $('histbody').innerHTML=emptyState({ic:'🔍', t:'Niciun rezultat pentru „'+esc(q)+'"',
      d:'Încearcă un cuvânt mai scurt sau altă formă: căutarea se uită în alimente, note și observații. De exemplu „pâine" în loc de „pâinea aia integrală".'}); return; }
    let html='<p class="muted" style="margin:2px 6px 10px">Atinge o masă din rezultate ca să vezi contextul: glicemii și insulină în jurul ei.</p>', lastDay='';
    evs.forEach(e=>{ const k=dKey(e.ts);
      if(k!==lastDay){ html+=`<div class="dayhead"><span>${dNice(e.ts)}</span></div>`; lastDay=k; }
      html+= e.type==='meal' ? eventCard(e).replace('onclick="editEv','onclick="ctx') : eventCard(e);
    });
    $('histbody').innerHTML=html; return;
  }
  // fără căutare: zilele recente, fiecare grupată pe momente (ca la Azi)
  const days=[...new Set(S.events.map(e=>dKey(e.ts)))].sort().reverse().slice(0,60);
  if(!days.length){ $('histbody').innerHTML=emptyState({ic:'📜', t:'Istoricul se scrie singur',
    d:'Pe măsură ce notezi, zilele se adună aici, fiecare grupată pe momente. Vei putea căuta orice ai mâncat vreodată și vedea ce glicemii și ce insulină ai avut în jurul mesei.',
    btn:{t:'Începe cu ziua de azi', go:"go('today')"}}); return; }
  let html='';
  days.forEach(k=>{
    const de=evOfDay(k).slice().sort((a,b)=>a.ts-b.ts);
    const dg=de.filter(x=>x.type==='gluc').map(x=>x.gluc.v);
    const avg=dg.length?Math.round(dg.reduce((a,b)=>a+b,0)/dg.length):null;
    const hc=de.filter(x=>x.type==='meal').reduce((a,x)=>a+(x.meal.hc||0),0);
    const meta=[avg?('medie '+avg):'', hc>0?(fmtHC(hc)+' HC'):''].filter(Boolean).join(' · ');
    html+=`<div class="dayhead"><span>${dNice(de[0].ts)}</span><span class="muted num">${meta}</span></div>`;
    html+=dayGroupedHtml(de);
  });
  $('histbody').innerHTML=html;
}
function ctx(id){
  const e=S.events.find(x=>x.id===id); if(!e){return;}
  const from=e.ts-2.5*3600e3, to=e.ts+4*3600e3;
  const around=S.events.filter(x=>x.ts>=from && x.ts<=to);
  openSheet(`<h3>Context · ${dNice(e.ts)}</h3>
    <p class="muted" style="margin:0 0 10px">Fereastră: 2½ h înainte → 4 h după masă.</p>
    ${around.map(eventCard).join('')}
    <button class="btn btn-g" onclick="closeSheet()">Închide</button>`);
}

    `<button class="chip ${PERIOD===p?'on':''}" onclick="PERIOD=${p};renderStats()">${p} zile</button>`).join('');

  const from=d0.getTime()-(PERIOD-1)*MS_D;
  const evs=S.events.filter(e=>e.ts>=from);
  const g=evs.filter(e=>e.type==='gluc').map(e=>({v:e.gluc.v, ts:e.ts}));
  if(!g.length){ $('statsbody').innerHTML = S.events.some(e=>e.type==='gluc')
    ? emptyState({ic:'📅', t:'Nicio glicemie în ultimele '+PERIOD+' zile',
        d:'Ai date mai vechi în jurnal. Alege o perioadă mai lungă din butoanele de sus ca să le vezi rezumate aici.'})
    : emptyState({ic:'📈', t:'Statisticile au nevoie de câteva zile',
        d:'După ce notezi glicemii câteva zile, aici vei vedea media, HbA1c estimat, timpul în țintă și dozele tipice, plus ICR și ISF pentru discuția cu medicul.',
        btn:{t:'Notează o glicemie', go:"go('today');shGluc()"}}); return; }
  const vals=g.map(x=>x.v);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const a1c=(avg+46.7)/28.7;
  const s=S.settings;

  const byPart=parts.map(p=>{ const pv=g.filter(x=>daypart(x.ts)===p).map(x=>x.v);
    return {p, avg: pv.length?Math.round(pv.reduce((a,b)=>a+b,0)/pv.length):0, n:pv.length}; });
  const maxAvg=Math.max(...byPart.map(b=>b.avg),1);

      else { rapidByDay[k]=(rapidByDay[k]||0)+e.ins.u; if(e.ins.kind==='corectie') corrByDay[k]=(corrByDay[k]||0)+1; } }
    if(e.type==='meal') hcByDay[k]=(hcByDay[k]||0)+(e.meal.hc||0);
  });
  const dayKeys=[...new Set(cEvs.map(e=>dKey(e.ts)))];
  const arr=o=>dayKeys.map(k=>o[k]||0);
  const bolMeals=cIns.filter(e=>e.ins.kind==='bolus').map(e=>e.ins.u);

        ${pi?`<div style="flex:${pi};background:var(--ok)">${pi>=14?'<span>'+pi+'%</span>':''}</div>`:''}
        ${ph?`<div style="flex:${ph};background:var(--high)">${ph>=14?'<span>'+ph+'%</span>':''}</div>`:''}
      </div>
      <div class="tirlegend">
        <div><i style="background:var(--low)"></i>sub țintă <b>${pl}%</b></div>
        <div><i style="background:var(--ok)"></i>în țintă <b>${pi}%</b></div>
        <div><i style="background:var(--high)"></i>peste <b>${ph}%</b></div>
      </div>
    </div>
    <div class="card"><h2>Media pe momente ale zilei</h2>

    </div>

      <div class="statgrid">
        <div class="stat"><b class="num">${med(arr(rapidByDay))}<small class="u">U</small></b><span>rapidă pe zi</span></div>
        <div class="stat"><b class="num">${med(Object.values(bazByDay))}<small class="u">U</small></b><span>bazală pe zi</span></div>

    </div>
    ${(function(){
      const icr=computeICR(cEvs); const isf=computeISF(cEvs);
      const parts=['Dimineața','Prânz','Cină','Seara'];
      const cells=parts.map(p=>{ const v=(icr[p]||[]).filter(x=>x>0);
        const lbl={'Dimineața':'ICR dimineața','Prânz':'ICR prânz','Cină':'ICR cină','Seara':'ICR seara'}[p];
        return `<div class="stat"><b class="num">${v.length? Math.round(median(v)):'—'}${v.length?'<small class="u">g/U</small>':''}</b><span>${lbl}</span></div>`; }).join('');
      const isfOk = isf.vals.length>=10;
      const isfCell = isfOk
        ? `<b class="num">${Math.round(median(isf.vals))}<small class="u">mg/dl<span style="opacity:.6">/U</span></small></b><span>ISF estimat</span>`
        : `<b class="num">—</b><span>ISF estimat</span>`;
      return `<div class="card"><h2>ICR & ISF observați</h2>
        <div class="statgrid">${cells}<div class="stat">${isfCell}</div>
          <div class="stat"><b class="num">${isf.clean}</b><span>corecții curate</span></div></div>
        <p class="muted" style="margin:10px 0 0"><b>ICR</b> arată câte grame de carbohidrați acoperă o unitate de insulină rapidă, calculat ca mediană pe fiecare moment al zilei. <b>ISF</b> arată cu cât scade glicemia la o unitate de corecție; se estimează doar din corecțiile „curate", adică cele fără mâncare sau alt bolus în intervalul de 2–4 h de observație.${isfOk?'':` Deocamdată ai ${isf.clean} astfel de corecții din ${isf.total}; ISF apare de la 10, ca cifra să nu fie înșelătoare.`} Sunt <b>valori descriptive din istoricul tău</b>, nu recomandări; utile de arătat medicului.</p>
      </div>`;
    })()}`;
}
</script>

<script>
/* ================= EXPORT / BACKUP / IMPORT ================= */
function stamp(){ const d=new Date(); return d.getFullYear()+two(d.getMonth()+1)+two(d.getDate()); }
function downloadOrShare(name, mime, content){
  const blob=new Blob([content],{type:mime});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], title:name}).catch(()=>plainDownload(blob,name));
  } else plainDownload(blob,name);
}
function plainDownload(blob,name){
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
}

const TYPE_RO={gluc:'Glicemie', meal:'Masă', ins:'Insulină', kg:'Greutate', note:'Notă', act:'Activitate'};
function exportCSV(){
  const {H, rows}=evRows();
  const foodRows=S.foods.map(f=>({Data:'',Ora:'',Tip:'Aliment',Glicemie:'',Sursa:f.fav?'favorit':'',Insulina:'',Unitati:'',

/* ================= EXPORT XLSX (generator propriu, zero dependențe) =================
   Un .xlsx este o arhivă ZIP cu fișiere XML. Scriem ZIP-ul fără compresie
   (metoda "store"), pe care Excel/LibreOffice/Google Sheets îl citesc normal.
   Astfel exportul nativ Excel rămâne în spiritul aplicației: un singur fișier, offline. */
const CRC_T=(()=>{ const t=new Uint32Array(256);
  for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=c&1?0xEDB88320^(c>>>1):c>>>1; t[n]=c>>>0; }
  return t; })();
function crc32(b){ let c=0xFFFFFFFF; for(let i=0;i<b.length;i++) c=CRC_T[(c^b[i])&0xFF]^(c>>>8); return (c^0xFFFFFFFF)>>>0; }
const xenc=s=>new TextEncoder().encode(s);
const xesc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');
function zipStore(files){
  const parts=[], central=[]; let off=0;
  const d=new Date(), dT=((d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1))&0xFFFF;
  const dD=(((d.getFullYear()-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate())&0xFFFF;
  const u16=v=>[v&255,(v>>8)&255], u32=v=>[v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255];
  files.forEach(f=>{
    const nm=xenc(f.name), crc=crc32(f.data), sz=f.data.length;
    const lh=[...u32(0x04034b50),...u16(20),...u16(0x0800),...u16(0),...u16(dT),...u16(dD),
      ...u32(crc),...u32(sz),...u32(sz),...u16(nm.length),...u16(0)];
    parts.push(new Uint8Array(lh), nm, f.data);
    central.push([...u32(0x02014b50),...u16(20),...u16(20),...u16(0x0800),...u16(0),...u16(dT),...u16(dD),
      ...u32(crc),...u32(sz),...u32(sz),...u16(nm.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(off),...nm]);
    off += lh.length + nm.length + sz;
  });
  const cdB=new Uint8Array([].concat(...central));
  const eo=new Uint8Array([...u32(0x06054b50),...u16(0),...u16(0),...u16(files.length),...u16(files.length),
    ...u32(cdB.length),...u32(off),...u16(0)]);
  let tot=0; parts.forEach(p=>tot+=p.length); tot+=cdB.length+eo.length;
  const out=new Uint8Array(tot); let p=0;
  parts.forEach(x=>{ out.set(x,p); p+=x.length; });
  out.set(cdB,p); p+=cdB.length; out.set(eo,p);
  return out;
}
function colName(n){ let s=''; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=(n-1-m)/26; } return s; }
function sheetXML(H, rows){
  const cell=(c,r,v,hdr)=>{
    const ref=colName(c)+r;
    if(v===''||v===null||v===undefined) return '';
    if(!hdr && typeof v==='number' && isFinite(v)) return `<c r="${ref}"><v>${v}</v></c>`;
    return `<c r="${ref}" t="inlineStr"${hdr?' s="1"':''}><is><t xml:space="preserve">${xesc(v)}</t></is></c>`;
  };
  let x=`<row r="1">`+H.map((h,i)=>cell(i+1,1,h,true)).join('')+`</row>`;
  rows.forEach((r,ri)=>{ x+=`<row r="${ri+2}">`+H.map((h,i)=>cell(i+1,ri+2,r[h],false)).join('')+`</row>`; });
  const cols=H.map((h,i)=>`<col min="${i+1}" max="${i+1}" width="${
    h==='Alimente'||h==='Aliment'?46:h==='Nota'?40:h==='Data'?11:h==='Ora'?7:12}" customWidth="1"/>`).join('');
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<dimension ref="A1:${colName(H.length)}${rows.length+1}"/>
<sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>
<cols>${cols}</cols><sheetData>${x}</sheetData>
<autoFilter ref="A1:${colName(H.length)}${rows.length+1}"/></worksheet>`;
}
function buildXLSX(sheets){
  const ov=sheets.map((s,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('');
  const sh=sheets.map((s,i)=>`<sheet name="${xesc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('');
  const rel=sheets.map((s,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('')
    +`<Relationship Id="rId${sheets.length+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`;
  const files=[
    {name:'[Content_Types].xml', data:xenc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
${ov}<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`)},
    {name:'_rels/.rels', data:xenc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`)},
    {name:'xl/workbook.xml', data:xenc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${sh}</sheets></workbook>`)},
    {name:'xl/_rels/workbook.xml.rels', data:xenc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${rel}</Relationships>`)},
    {name:'xl/styles.xml', data:xenc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font></fonts>
<fills count="3"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill><fill><patternFill patternType="solid"><fgColor rgb="FF0E7C7B"/><bgColor indexed="64"/></patternFill></fill></fills>
<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="2"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"/></cellXfs>
<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`)}
  ];
  sheets.forEach((s,i)=>files.push({name:'xl/worksheets/sheet'+(i+1)+'.xml', data:xenc(sheetXML(s.H, s.rows))}));
  return zipStore(files);
}
function evRows(){
  const H=['Data','Ora','Tip','Glicemie','Sursa','Insulina','Unitati','Scop','Alimente','HC','Greutate','Nota'];
  const rows=[...S.events].map(e=>{
    const r={Data:dKey(e.ts), Ora:tHM(e.ts), Tip:TYPE_RO[e.type]||e.type, Glicemie:'',Sursa:'',Insulina:'',Unitati:'',Scop:'',Alimente:'',HC:'',Greutate:'',Nota:''};
    if(e.type==='gluc'){ r.Glicemie=e.gluc.v; r.Sursa=e.gluc.src; }
    if(e.type==='ins'){ r.Insulina=e.ins.name; r.Unitati=e.ins.u; r.Scop=e.ins.kind; }
    if(e.type==='meal'){ r.Alimente=e.meal.items.map(i=>i.name+(i.grams?' ['+i.grams+'g]':'')+' = '+i.hc+'HC').join(' + '); r.HC=e.meal.hc||''; r.Nota=e.meal.note||''; }
    if(e.type==='kg'){ r.Greutate=e.kg.v; }
    if(e.type==='note'||e.type==='act'){ r.Nota=e.note.text; }
    return r;
  });
  return {H, rows};
}
function exportXLSX(){
  try{
    const {H, rows}=evRows();
    const fH=['Aliment','Mod','HC','Favorit','Folosit de'];
    const fRows=S.foods.map(f=>({Aliment:f.name, Mod:f.mode==='per100'?'la 100 g':'pe porție',
      HC:f.val, Favorit:f.fav?'da':'', 'Folosit de':f.uses||0}));
    const buf=buildXLSX([{name:'Jurnal', H, rows},{name:'Alimente', H:fH, rows:fRows}]);
    downloadOrShare('GlucoLog_'+(S.settings.name||'profil')+'_'+stamp()+'.xlsx',
      'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', buf);
    toast('Fișier Excel generat');
  }catch(err){
    toast('Exportul Excel nu a reușit; încearcă CSV');
  }
}
function importFile(inp){
  const f=inp.files[0]; if(!f) return; inp.value='';
  if(f.size>15*1024*1024){ alert('Fișierul e prea mare (peste 15 MB). Verifică dacă e într-adevăr un backup GlucoLog.'); return; }
  const rd=new FileReader();
  rd.onerror=()=>alert('Fișierul nu a putut fi citit de pe dispozitiv. Încearcă din nou sau alege alt fișier.');
  rd.onload=()=>{
    const txt=String(rd.result||'');
    const isJson=f.name.toLowerCase().endsWith('.json');
    const isCsv=f.name.toLowerCase().endsWith('.csv');
    if(!isJson && !isCsv){
      alert('Tip de fișier nerecunoscut. GlucoLog acceptă doar:\n• backup .json (creat din „Backup acum")\n• tabel .csv (creat din „Export")');
      return;
    }
    if(isJson){ importJSON(txt); } else { importCSVsafe(txt); }
  };
  rd.readAsText(f,'utf-8');
}
function importJSON(txt){
  let d;
  try{ d=JSON.parse(txt); }
  catch(e){ alert('Fișierul .json pare deteriorat și nu a putut fi citit.\n\nDatele tale actuale NU au fost modificate. Încearcă alt backup.'); return; }
  // validare structură
  if(typeof d!=='object' || !d || !Array.isArray(d.events) || typeof d.settings!=='object' || !d.settings){
    alert('Fișierul nu are structura unui backup GlucoLog.\n\nDatele tale actuale NU au fost modificate.'); return;
  }
  // validare minimală a câtorva evenimente (să fie cu adevărat GlucoLog)
  const bad = d.events.some(e=>!e || typeof e!=='object' || typeof e.ts!=='number' || !e.type);
  if(bad){ alert('Backupul conține intrări nevalide și nu a fost importat.\n\nDatele tale actuale NU au fost modificate.'); return; }
  shConfirm('Înlocuiește COMPLET datele de pe acest telefon. Recomandat să faci întâi un backup al datelor curente.', ()=>{
    if(!Array.isArray(d.foods)) d.foods=seedFoods();
    S=d; sortEv(); save(); go('today'); toast('Backup restaurat cu succes');
  }, {title:'Backup din '+esc(d.settings.name||'?')+' cu '+d.events.length+' intrări', confirmLabel:'Continuă, înlocuiește datele'});
}
function importCSVsafe(txt){
  let r;
  try{ r=importCSV(txt); }
  catch(e){
    alert('Fișierul CSV nu a putut fi procesat; pare deteriorat sau într-un format neașteptat.\n\nDatele tale actuale NU au fost modificate. Folosește un CSV exportat din GlucoLog.');
    return;
  }
  if(r.error){
    alert(r.error+'\n\nDatele tale actuale NU au fost modificate.');
    return;
  }
  if(r.added===0 && r.foodsAdded===0){
    alert('Nu s-a importat nimic nou.\n'+(r.skipped?('Cele '+r.skipped+' zile din fișier existau deja în aplicație.'):'Fișierul nu conținea intrări recunoscute.')); 
    return;
  }
  let msg='Import reușit: '+r.added+' intrări noi'+(r.foodsAdded?(' și '+r.foodsAdded+' alimente'):'')+'.';
  if(r.skipped) msg+='\n'+r.skipped+' zile existau deja și au fost sărite (protecție anti-dubluri).';
  alert(msg);
  go('today');
}
function importCSV(txt){
  txt=String(txt||'').replace(/^\uFEFF/,'').replace(/^sep=.\r?\n/,'');
  const firstLine=(txt.split('\n')[0]||'');
  const lines=parseCSV(txt, firstLine.includes(';')?';':',');
  if(!lines.length) return {error:'Fișierul CSV este gol.'};
  const H=lines.shift().map(h=>h.trim());
  const ix=n=>H.indexOf(n);
  // validare header: trebuie să fie un CSV GlucoLog (măcar Data+Tip)
  if(ix('Tip')<0 || (ix('Data')<0 && !H.includes('Alimente'))){
    return {error:'Fișierul nu pare un CSV exportat din GlucoLog (lipsesc coloanele așteptate).'};
  }
  const seen=new Set(S.events.map(e=>e.ts+'|'+e.type));
  const existingDays=new Set(S.events.map(e=>dKey(e.ts)));
  const K2T={'Glicemie':'gluc','Masă':'meal','Masa':'meal','Insulină':'ins','Insulina':'ins','Greutate':'kg','Notă':'note','Nota':'note','Activitate':'act'};
  // STAGING: construim în copii separate; comitem în S doar la final, dacă totul e ok
  const newEvents=[], newFoods=[]; const skipped=new Set();
  lines.forEach(c=>{
    if(c.length<2) return;
    if(c[ix('Tip')]==='Aliment'){
      const name=(c[ix('Alimente')]||'').trim(), val=parseFloat(String(c[ix('HC')]).replace(',','.'));
      if(name&&val>0 && !S.foods.some(f=>f.name.toLowerCase()===name.toLowerCase()) && !newFoods.some(f=>f.name.toLowerCase()===name.toLowerCase()))
        newFoods.push({id:uid(),name,mode:c[ix('Scop')]==='portie'?'portie':'per100',val,fav:(c[ix('Sursa')]||'').includes('fav'),uses:0});
      return;
    }
    if(ix('Data')<0 || !c[ix('Data')]) return;
    if(existingDays.has(c[ix('Data')])){ skipped.add(c[ix('Data')]); return; }
    const ts=new Date(c[ix('Data')]+'T'+(c[ix('Ora')]||'12:00')).getTime();
    if(isNaN(ts)) return;
    const tp=K2T[c[ix('Tip')]]; if(!tp) return;
    if(seen.has(ts+'|'+tp)) return;
    const e={id:uid(), ts, type:tp};
    if(tp==='gluc'){ const v=parseFloat(c[ix('Glicemie')]); if(!v||v<20||v>900) return; e.gluc={v, src:c[ix('Sursa')]||'deget'}; }
    if(tp==='ins'){ const u=parseFloat(c[ix('Unitati')]); if(!u||u<=0||u>100) return; e.ins={name:c[ix('Insulina')]||'Fiasp', u, kind:c[ix('Scop')]||'bolus'}; }
    if(tp==='meal'){
      const items=(c[ix('Alimente')]||'').split(' + ').filter(Boolean).map(x=>{
        const m=x.match(/^(.*?)(?:\s*\[(\d+(?:[.,]\d+)?)g\])?\s*=\s*([\d.,]+)HC$/);
        return m? {name:m[1].trim(), grams:m[2]?parseFloat(m[2].replace(',','.')):null, hc:parseFloat(m[3].replace(',','.'))||0} : {name:x.trim(), grams:null, hc:0};
      });
      e.meal={items, hc:parseFloat(String(c[ix('HC')]).replace(',','.'))||items.reduce((a,i)=>a+i.hc,0), note:c[ix('Nota')]||''};
    }
    if(tp==='kg'){ const v=parseFloat(String(c[ix('Greutate')]).replace(',','.')); if(!v||v<20||v>400) return; e.kg={v}; }
    if(tp==='note'||tp==='act'){ const t=(c[ix('Nota')]||'').trim(); if(!t) return; e.note={text:t}; }
    newEvents.push(e);
  });
  // COMIT: abia acum atingem datele reale
  S.events.push(...newEvents);
  S.foods.push(...newFoods);
  sortEv(); save();
  return {added:newEvents.length, foodsAdded:newFoods.length, skipped:skipped.size};
}
function parseCSV(txt, sep){
  const out=[]; let row=[], cur='', inQ=false;
  for(let i=0;i<txt.length;i++){
    const ch=txt[i];
    if(inQ){ if(ch==='"'){ if(txt[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
    else if(ch==='"') inQ=true;
    else if(ch===sep){ row.push(cur); cur=''; }
    else if(ch==='\n'||ch==='\r'){ if(cur!==''||row.length){ row.push(cur); out.push(row); row=[]; cur=''; } }
    else cur+=ch;
  }
  if(cur!==''||row.length){ row.push(cur); out.push(row); }
  return out;
}

function bucketKey(ts, byWeek){

}
function doReport(days, detailed){
  const d0=new Date(); d0.setHours(0,0,0,0);
  const from=d0.getTime()-(days-1)*MS_D;
  const evs=S.events.filter(e=>e.ts>=from);
  const g=evs.filter(e=>e.type==='gluc').map(e=>({v:e.gluc.v,ts:e.ts}));
  if(!g.length){ toast('Nu există date în această perioadă'); return; }
  const s=S.settings, vals=g.map(x=>x.v);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length, a1c=(avg+46.7)/28.7;
  const nl=vals.filter(v=>v<s.low).length, ni=vals.filter(v=>v>=s.low&&v<=s.high).length;
  const daysSet=[...new Set(evs.map(e=>dKey(e.ts)))].sort();
  const nd=Math.max(daysSet.length,1);
  const ins=evs.filter(e=>e.type==='ins');
  const todayStart=d0.getTime();
  const cEvs=S.events.filter(e=>e.ts>=todayStart-days*MS_D && e.ts<todayStart);
  const cDays=new Set(cEvs.map(e=>dKey(e.ts))).size||1;
  const cIns=cEvs.filter(e=>e.type==='ins');
  const rapidByDay={}, bazByDay={}, corrByDay={}, hcByDay={};
  cEvs.forEach(e=>{ const k=dKey(e.ts);
    if(e.type==='ins'){ if(e.ins.kind==='bazala') bazByDay[k]=(bazByDay[k]||0)+e.ins.u;
      else { rapidByDay[k]=(rapidByDay[k]||0)+e.ins.u; if(e.ins.kind==='corectie') corrByDay[k]=(corrByDay[k]||0)+1; } }
    if(e.type==='meal') hcByDay[k]=(hcByDay[k]||0)+(e.meal.hc||0); });
  const dk=[...new Set(cEvs.map(e=>dKey(e.ts)))];
  const arr=o=>dk.map(k=>o[k]||0);
  const bolMeals=cIns.filter(e=>e.ins.kind==='bolus').map(e=>e.ins.u);
  const bazTip=median(Object.values(bazByDay));
  const hcAll=cEvs.filter(e=>e.type==='meal').reduce((a,e)=>a+(e.meal.hc||0),0);
  // evoluție pe săptămâni (≤35 zile) sau pe luni
  const byWeek = days<=35;
  const buckets={};
  g.forEach(x=>{ const k=bucketKey(x.ts,byWeek); (buckets[k]=buckets[k]||{vs:[],ts:x.ts}).vs.push(x.v); });
  ins.filter(e=>e.ins.kind==='corectie').forEach(e=>{ const k=bucketKey(e.ts,byWeek); if(buckets[k]) buckets[k].cor=(buckets[k].cor||0)+1; });
  // insulina pe perioade: doar zile complete
  const bDays={}, bBol={}, bBaz={};
  cEvs.forEach(e=>{ const k=bucketKey(e.ts,byWeek); (bDays[k]=bDays[k]||new Set()).add(dKey(e.ts)); });
  cIns.forEach(e=>{ const k=bucketKey(e.ts,byWeek);
    if(e.ins.kind==='bazala'){ const dk=dKey(e.ts); (bBaz[k]=bBaz[k]||{}); bBaz[k][dk]=(bBaz[k][dk]||0)+e.ins.u; }
    else bBol[k]=(bBol[k]||0)+e.ins.u; });
  const trendRows=Object.keys(buckets).sort().map(k=>{
    const b=buckets[k], m=b.vs.reduce((a,x)=>a+x,0)/b.vs.length;
    const tir=Math.round(b.vs.filter(v=>v>=s.low&&v<=s.high).length/b.vs.length*100);
    const hypo=b.vs.filter(v=>v<s.low).length;
    const ndB=bDays[k]?bDays[k].size:0;
    const rap=ndB? ((bBol[k]||0)/ndB).toFixed(1)+' U':'—';
    const bz=bBaz[k]? median(Object.values(bBaz[k]))+' U':'—';
    return `<tr><td>${byWeek?'Săpt. din ':''}${bucketLabel(b.ts,byWeek)}</td><td>${Math.round(m)}</td><td>${((m+46.7)/28.7).toFixed(1)}%</td><td>${tir}%</td><td>${hypo}</td><td>${b.cor||0}</td><td>${rap}</td><td>${bz}</td><td>${b.vs.length}</td></tr>`;
  }).join('');
  const parts=['Dimineața','Prânz','Cină','Seara / noaptea'];
  const rowsPart=parts.map(p=>{ const pv=g.filter(x=>daypart(x.ts)===p).map(x=>x.v);
    return `<tr><td>${p}</td><td>${pv.length?Math.round(pv.reduce((a,b)=>a+b,0)/pv.length):'—'}</td><td>${pv.length?Math.min(...pv):'—'}</td><td>${pv.length?Math.max(...pv):'—'}</td><td>${pv.length}</td></tr>`; }).join('');
  const kg=evs.filter(e=>e.type==='kg');
  let journal='';
  if(detailed){
    const jDays=[...daysSet].reverse();
    journal='<h2>Jurnal detaliat, toate cele '+daysSet.length+' zile cu date din perioadă</h2><table><tr><th>Ziua</th><th>Evenimente</th></tr>'+
      jDays.map(k=>{
        const de=evOfDay(k).slice().sort((a,b)=>a.ts-b.ts);
        const parts=['Dimineața','Prânz','Cină','Seara / noaptea'];
        const evLine=e=>{
          if(e.type==='gluc') return tHM(e.ts)+': glicemie '+e.gluc.v;
          if(e.type==='ins') return tHM(e.ts)+': '+e.ins.u+'U '+e.ins.name+(e.ins.kind==='corectie'?' (corecție)':(e.ins.kind==='bazala'?' (bazală)':''));
          if(e.type==='meal') return tHM(e.ts)+': masă '+(e.meal.hc?e.meal.hc+' HC: ':'')+e.meal.items.map(i=>i.name).join(', ').slice(0,180)+(e.meal.note?' · '+esc(e.meal.note):'');
          if(e.type==='kg') return tHM(e.ts)+': greutate '+e.kg.v+' kg';
          return tHM(e.ts)+': '+esc(e.note.text).slice(0,180);
        };
        let blocks='';
        parts.forEach(p=>{
          const pe=de.filter(e=>daypart(e.ts)===p);
          if(!pe.length) return;
          const hc=pe.filter(e=>e.type==='meal').reduce((a,e)=>a+(e.meal.hc||0),0);
          const label=p.replace(' / noaptea','');
          blocks+=`<div style="margin-top:4px"><b>${label}</b>${hc>0?` <span style="color:#B0672E">· ${fmtHC(hc)} HC</span>`:''}<br>`+
                  pe.map(evLine).join('<br>')+'</div>';
        });
        return `<tr><td style="white-space:nowrap;vertical-align:top">${dNice(de[0].ts)}</td><td>${blocks}</td></tr>`;
      }).join('')+'</table>';
  }
  $('report').innerHTML=`
    <h1>Jurnal glicemic · ${esc(s.name||'')}</h1>
    <div class="rmeta">Perioada: ultimele ${days} de zile, până la ${dNice(Date.now())} · ${daysSet.length} zile cu date · Țintă: ${s.low}–${s.high} mg/dl · Generat din GlucoLog</div>
    <h2>Imagine de ansamblu</h2>
    <table>
      <tr><th>Medie glicemică</th><th>HbA1c estimat*</th><th>În țintă</th><th>Sub țintă (hipo)</th><th>Peste țintă</th><th>Măsurători</th><th>Măsurători / zi</th></tr>
      <tr><td><b>${Math.round(avg)} mg/dl</b></td><td><b>${a1c.toFixed(1)}%</b></td><td>${Math.round(ni/vals.length*100)}%</td>
          <td>${Math.round(nl/vals.length*100)}% (${nl})</td><td>${Math.round((vals.length-nl-ni)/vals.length*100)}%</td><td>${vals.length}</td><td>${(vals.length/nd).toFixed(1)}</td></tr>
    </table>
    <h2>Evoluția pe ${byWeek?'săptămâni':'luni'}</h2>
    <table><tr><th>${byWeek?'Săptămâna':'Luna'}</th><th>Medie</th><th>A1c est.</th><th>În țintă</th><th>Hipo</th><th>Corecții</th><th>Rapidă/zi</th><th>Bazală/zi</th><th>Măsurători</th></tr>${trendRows}</table>
    <h2>Glicemii pe momente ale zilei</h2>
    <table><tr><th>Moment</th><th>Medie</th><th>Min</th><th>Max</th><th>Nr.</th></tr>${rowsPart}</table>
    <h2>Insulină și mese, interval pe zile complete (ziua curentă exclusă)</h2>
    <table><tr><th>Rapidă / zi</th><th>Rapidă / masă</th><th>Corecții / zi</th><th>Bazală / zi</th><th>HC / zi</th></tr>
    <tr><td>${rangeLabel(arr(rapidByDay),' U')}</td><td>${rangeLabel(bolMeals,' U')}</td><td>${rangeLabel(arr(corrByDay),'')}</td><td>${rangeLabel(Object.values(bazByDay),' U')}</td><td>${rangeLabel(arr(hcByDay),'')}</td></tr></table>
    ${(function(){
      const icr=computeICR(cEvs); const isf=computeISF(cEvs);
      const parts=['Dimineața','Prânz','Cină','Seara'];
      const rows=parts.map(p=>{ const v=(icr[p]||[]).filter(x=>x>0);
        return `<tr><td>${p}</td><td>${v.length? '1 U la '+Math.round(median(v))+' g':'—'}</td><td>${v.length? Math.round(Math.min(...v))+'–'+Math.round(Math.max(...v))+' g':'—'}</td><td>${v.length}</td></tr>`; }).join('');
      const isfLine = isf.vals.length>=10
        ? `~${Math.round(median(isf.vals))} mg/dl scădere la 1 U (interval ${Math.round(Math.min(...isf.vals))}–${Math.round(Math.max(...isf.vals))}, din ${isf.clean} corecții „curate")`
        : `date insuficiente pentru o estimare fiabilă (doar ${isf.clean} corecții „curate" din ${isf.total})`;
      return `<h2>Parametri derivați: ICR și ISF (observați, ziua curentă exclusă)</h2>
        <p style="color:#444">Valori <b>descriptive</b>, derivate din raportul dintre carbohidrați/insulină și din corecții. Reflectă ce s-a practicat, nu sunt recomandări; interpretarea aparține medicului.</p>
        <table><tr><th>Moment</th><th>ICR tipic (median)</th><th>Interval</th><th>Mese</th></tr>${rows}</table>
        <p style="margin-top:6px"><b>ISF (factor de corecție) estimat:</b> ${isfLine}. Estimat doar din corecțiile fără mâncare sau alt bolus în intervalul de 2–4 h de observație.</p>`;
    })()}
    <p style="color:#444">Valorile sunt interval minim–maxim pe ${cDays} zile complete; „tipic" = mediana. Doza zilnică de bazală și dozele la masă se citesc astfel mai fidel decât ca medie unică.</p>
    ${kg.length?`<h2>Greutate</h2><p>${kg[0].kg.v} kg (${dNice(kg[0].ts)}) → ${kg[kg.length-1].kg.v} kg (${dNice(kg[kg.length-1].ts)})</p>`:''}
    <p>*HbA1c estimat din media măsurătorilor capilare (formula ADA eAG→A1c); tendință orientativă, nu înlocuiește dozarea de laborator.</p>
    ${journal}`;
  closeSheet();
  window.print();
}

function bkAge(){

  if(!lb) return {never:true, d:null};
  return {never:false, d:Math.floor((Date.now()-lb)/MS_D), ts:lb};
}
function bkText(){
  const a=bkAge();
  if(a.never) return 'Niciun backup făcut încă';
  if(a.d<=0) return 'Ultimul backup: azi';
  if(a.d===1) return 'Ultimul backup: ieri';
  return 'Ultimul backup: acum '+a.d+' zile';
}

function bannerCheck(){
  const b=$('banner');
  if(S.events.length<=3){ b.style.display='none'; return; }
  const dd=Math.floor((Date.now()-(S.settings.lastBackup||0))/MS_D);
  const never=!S.settings.lastBackup;
  if(!never && dd<7){ b.style.display='none'; return; }
  b.style.display='block';
  b.classList.remove('urgent');
  if(never){
    b.innerHTML='<b>Nu ai făcut încă niciun backup.</b>Datele tale trăiesc doar pe acest telefon. Dacă îl schimbi sau ștergi aplicația, se pierd. Un backup durează 30 de secunde.<br><button onclick="backupNow()">Fă primul backup →</button>';
  } else if(dd>=21){
    b.classList.add('urgent');
    b.innerHTML='<b>⚠ Au trecut '+dd+' de zile fără backup!</b>Riști să pierzi tot jurnalul dacă se întâmplă ceva cu telefonul. Fă un backup chiar acum, durează 30 de secunde.<br><button onclick="backupNow()">Fă backup acum →</button>';
  } else if(dd>=14){
    b.innerHTML='<b>Au trecut '+dd+' de zile de la ultimul backup.</b>Jurnalul e doar pe acest telefon. Merită 30 de secunde de siguranță.<br><button onclick="backupNow()">Fă backup acum →</button>';
  } else {
    b.innerHTML='<b>A trecut o săptămână de la ultimul backup.</b>30 de secunde de siguranță pentru jurnalul tău.<br><button onclick="backupNow()">Fă backup acum →</button>';
  }
}

/* ================= START ================= */
sortEv();
applyTheme();
renderToday(); renderMore(); bannerCheck(); renderBkLine();
if(!S.settings.accepted){ shConsent(); }
else if(!S.settings.name) shSettings(true);
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
