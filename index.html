/* Chrome pe Android „îngheață" intenționat șirul clasic (raportează mereu Android 10
   și o versiune rotunjită), ca măsură de confidențialitate. Datele reale se cer
   explicit, prin interfața de „client hints". Dacă nu există, cădem pe citirea
   șirului clasic — corectă pe iOS și pe desktop. */
async function deviceLabel(){
  try{
    const d=navigator.userAgentData;
    if(d && d.getHighEntropyValues){
      const h=await d.getHighEntropyValues(['platformVersion','model','fullVersionList']);
      const out=[];
      if(d.platform) out.push(d.platform+(h.platformVersion? ' '+String(h.platformVersion).split('.')[0] : ''));
      const brands=(h.fullVersionList||d.brands||[]).filter(b=>!/not[^a-z]*a[^a-z]*brand/i.test(b.brand||''));
      const pick=brands.find(b=>!/chromium/i.test(b.brand))||brands[0];
      if(pick) out.push(pick.brand+' '+String(pick.version||'').split('.')[0]);
      if(h.model) out.push(h.model);
      if(out.length>1) return out.join(' · ');
    }
  }catch(e){}
  return deviceLabelUA();
}
function deviceLabelUA(){
  const ua=navigator.userAgent||'';
  const out=[];
  // Chrome pe Android „îngheață" intenționat aceste date: raportează mereu
  // Android 10 și modelul „K", indiferent de telefon. Dacă vedem semnătura asta,
  // spunem cinstit că versiunea e ascunsă, în loc să afișăm una falsă.
  const frozen = /Android 10[;)]/.test(ua) && /;\s*K[;)]/.test(ua);
  let m;
  if(frozen) out.push('Android (versiune ascunsă de browser)');
  else if((m=ua.match(/Android\s+([\d.]+)/))) out.push('Android '+m[1]);
  else if((m=ua.match(/(?:iPhone )?OS\s+(\d+)[_.](\d+)/)) && /iPhone|iPad|iPod/.test(ua)) out.push('iOS '+m[1]+'.'+m[2]);
  else if(/Windows NT 10/.test(ua)) out.push('Windows');
  else if((m=ua.match(/Mac OS X\s+(\d+)[_.](\d+)/))) out.push('macOS '+m[1]+'.'+m[2]);
  else if(/Linux/.test(ua)) out.push('Linux');
  // browser (ordinea contează: Edge/Samsung/Opera se dau drept Chrome)
  if((m=ua.match(/EdgA?\/([\d]+)/))) out.push('Edge '+m[1]);
  else if((m=ua.match(/SamsungBrowser\/([\d]+)/))) out.push('Samsung Internet '+m[1]);
  else if((m=ua.match(/OPR\/([\d]+)/))) out.push('Opera '+m[1]);
  else if((m=ua.match(/FxiOS\/([\d]+)|Firefox\/([\d]+)/))) out.push('Firefox '+(m[1]||m[2]));
  else if((m=ua.match(/CriOS\/([\d]+)/))) out.push('Chrome '+m[1]);
  else if((m=ua.match(/Chrome\/([\d]+)/))) out.push('Chrome '+m[1]);
  else if(/Safari/.test(ua)) out.push('Safari');
  // modelul telefonului; pe Android modern e ascuns („K"), pe iOS nu e publicat
  if(!frozen && (m=ua.match(/Android[^;]*;\s*([^;)]+?)(?:\s+Build\/|\))/))){
    const model=m[1].trim();
    if(model && !/^(wv|K)$/i.test(model) && model.length<40) out.push(model);
  } else if(/iPhone/.test(ua)) out.push('iPhone');
  else if(/iPad/.test(ua)) out.push('iPad');
  return out.length? out.join(' · ') : 'nedetectat';
}

           !okDisp&&('display='+(j.display||'lipsă')), !has192&&'lipsă iconiță 192',
           !has512&&'lipsă iconiță 512'].filter(Boolean).join(', ');
      // verificăm și că iconițele chiar se pot descărca
      const src=(j.icons||[]).map(i=>i.src);
      let bad=[];
      for(const s of src){ try{ const ir=await fetch(s,{cache:'no-store'}); if(!ir.ok) bad.push(s+' ('+ir.status+')'); }catch(e){ bad.push(s+' (eroare)'); } }
      icOk = bad.length===0; ic = icOk ? 'toate se descarcă' : 'PROBLEME: '+bad.join(', ');
    }
  }catch(e){ mf='eroare: '+e.name; }
  R.push(['Manifest', mf, mfOk]);
  R.push(['Iconițe', ic, icOk]);
  R.push(['Stocare persistentă', PERSIST_OK===true?'da':PERSIST_OK===false?'nu (browserul poate șterge datele)':'necunoscut', PERSIST_OK]);

  // versiunea din service worker: dacă nu coincide cu a aplicației, a rămas cod vechi în cache
  let swv='—', swvOk=null;
  try{
    const keys=await caches.keys();
    const mine=keys.filter(k=>k.indexOf('glucolog-')===0).map(k=>k.replace('glucolog-',''));
    if(mine.length){
      swv=mine.join(', ');
      swvOk = mine.length===1 && mine[0]===APP_VER;
      if(!swvOk) swv+= (mine.length>1 ? ' (mai multe versiuni în cache)' : ' (diferă de aplicație: '+APP_VER+')');
    }
  }catch(e){}
  R.push(['Versiune în cache', swv, swvOk]);

  // spațiu folosit: pe iPhone cota e mică, iar jurnalul crește cu anii
  let sp='necunoscut';
  try{
    if(navigator.storage && navigator.storage.estimate){
      const q=await navigator.storage.estimate();
      const mb=v=>(v/1048576).toFixed(1)+' MB';
      sp = q.usage!=null ? mb(q.usage)+(q.quota? ' din '+mb(q.quota):'') : 'necunoscut';
    }
  }catch(e){}
  R.push(['Spațiu folosit', sp, null]);
  R.push(['Intrări în jurnal', String(S.events.length), null]);
  R.push(['Dispozitiv', await deviceLabel(), null]);

  const verdict = (swOk && mfOk && icOk===true && location.protocol==='https:')
    ? '<p class="muted" style="margin:12px 0 0">Toate condițiile de instalare sunt îndeplinite. Dacă Chrome tot oferă doar „Create shortcut", închide complet aplicația și redeschide-o de două ori, apoi reîncearcă.</p>'
    : '<p class="muted" style="margin:12px 0 0">Rândurile marcate cu roșu sunt motivul pentru care instalarea nu e oferită.</p>';
  const el=$('diagbody');
  if(el) el.innerHTML=R.map(r=>diagRow(r[0],r[1],r[2])).join('')+verdict
    +'<button class="btn btn-g" style="margin-top:12px" onclick="copyDiag()">Copiază raportul</button>';
  DIAG_TEXT = R.map(r=>r[0]+': '+r[1]).join('\n');
}
let DIAG_TEXT='';
async function copyDiag(){
  const t='Nivelo — diagnostic\n'+DIAG_TEXT;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(t); toast('Raport copiat'); return; }
    throw 0;
  }catch(e){
    // fără acces la clipboard: îl arătăm ca text, de unde poate fi selectat manual
    openSheet2(`<h3>Raport diagnostic</h3>
      <textarea class="inp" rows="12" readonly style="font-size:calc(12px*var(--fs)); font-family:monospace">${esc(t)}</textarea>
      <button class="btn btn-p" style="margin-top:10px" onclick="closeSheet2()">Închide</button>`);
  }
}

/* ================= INDICATOR BACKUP ================= */
function bkAge(){
  const lb=S.settings.lastBackup;
  if(!lb) return {never:true, d:null};
  return {never:false, d:Math.floor((Date.now()-lb)/MS_D), ts:lb};
}
function bkText(){
  const a=bkAge();
  if(a.never) return 'Niciun backup făcut încă';
  if(a.d<=0) return 'Ultimul backup: azi';
  if(a.d===1) return 'Ultimul backup: ieri';
  return 'Ultimul backup: acum '+a.d+' zile';
}
function renderBkLine(){
  const el=$('bkline'); if(!el) return;
  if(S.events.length<=3){ el.innerHTML=''; return; }   // jurnal aproape gol: nu deranjăm
  const a=bkAge();
  const cls = a.never||a.d>=14 ? 'bad' : a.d>=7 ? 'warn' : '';
  el.innerHTML=`<div class="bkline ${cls}"><i></i><span>${bkText()}</span>
    <button onclick="backupNow()">Fă unul acum</button></div>`;
}
function renderMore(){
  const s=S.settings;
  $('setSummary').textContent=(s.name||'Fără nume')+' · țintă '+s.low+'–'+s.high+' · '+s.insulins.join(' + ');
  const a=bkAge(), bi=$('bkinfo');
  if(bi){
    bi.innerHTML = a.never
      ? 'Niciun backup făcut încă.<br>Datele trăiesc doar pe acest telefon.'
      : esc(bkText())+'<br>Recomandat săptămânal.';
  }
}

/* ================= BACKUP REMINDER ================= */
function bannerCheck(){
  const b=$('banner');
  if(S.events.length<=3){ b.style.display='none'; return; }
  const dd=Math.floor((Date.now()-(S.settings.lastBackup||0))/MS_D);
  const never=!S.settings.lastBackup;
  if(!never && dd<7){ b.style.display='none'; return; }
  b.style.display='block';
  b.classList.remove('urgent');
  if(never){
    b.innerHTML='<b>Nu ai făcut încă niciun backup.</b>Datele tale trăiesc doar pe acest telefon. Dacă îl schimbi sau ștergi aplicația, se pierd. Un backup durează 30 de secunde.<br><button onclick="backupNow()">Fă primul backup →</button>';
  } else if(dd>=21){
    b.classList.add('urgent');
    b.innerHTML='<b>⚠ Au trecut '+dd+' de zile fără backup!</b>Riști să pierzi tot jurnalul dacă se întâmplă ceva cu telefonul. Fă un backup chiar acum, durează 30 de secunde.<br><button onclick="backupNow()">Fă backup acum →</button>';
  } else if(dd>=14){
    b.innerHTML='<b>Au trecut '+dd+' de zile de la ultimul backup.</b>Jurnalul e doar pe acest telefon. Merită 30 de secunde de siguranță.<br><button onclick="backupNow()">Fă backup acum →</button>';
  } else {
    b.innerHTML='<b>A trecut o săptămână de la ultimul backup.</b>30 de secunde de siguranță pentru jurnalul tău.<br><button onclick="backupNow()">Fă backup acum →</button>';
  }
}

/* ================= START ================= */
sortEv();
applyTheme(); applyFontScale();
renderToday(); renderMore(); bannerCheck(); renderBkLine(); storageWarn();
askPersist();
// după un refresh, revenim pe secțiunea unde eram
try{ const lv=sessionStorage.getItem('nivelo_view');
     if(lv && lv!=='today' && $('v-'+lv)) go(lv); }catch(e){}
if(getUndo()) showUndoBar(getUndo());
if(!S.settings.accepted){ shConsent(); }
else if(!S.settings.name) shSettings(true);
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
